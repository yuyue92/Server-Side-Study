<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>学生信息管理系统</title>
  <link rel="stylesheet" href="/static/css/app.css">
</head>
<body>
  <!-- 侧边栏 -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <span class="logo-icon">🎓</span>
        <div class="logo-text">
          <span class="logo-title">学生信息系统</span>
          <span class="logo-sub">Student Management</span>
        </div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <a class="nav-item active" data-page="dashboard" onclick="showPage('dashboard')">
        <span class="nav-icon">◉</span> 数据总览
      </a>
      <a class="nav-item" data-page="list" onclick="showPage('list')">
        <span class="nav-icon">≡</span> 学生档案
      </a>
      <a class="nav-item" data-page="add" onclick="showPage('add')">
        <span class="nav-icon">＋</span> 录入学生
      </a>
      <div class="nav-divider"></div>
      <div class="nav-group-label">预留模块</div>
      <a class="nav-item disabled">
        <span class="nav-icon">📊</span> 成绩登记
        <span class="badge">即将推出</span>
      </a>
      <a class="nav-item disabled">
        <span class="nav-icon">📚</span> 课程绑定
        <span class="badge">即将推出</span>
      </a>
      <a class="nav-item disabled">
        <span class="nav-icon">🏥</span> 健康档案
        <span class="badge">即将推出</span>
      </a>
    </nav>
  </aside>

  <!-- 主内容区 -->
  <main class="main">
    <!-- 顶栏 -->
    <header class="topbar">
      <div class="topbar-left">
        <h1 id="page-title" class="page-title">数据总览</h1>
      </div>
      <div class="topbar-right">
        <span class="time-display" id="clock"></span>
      </div>
    </header>

    <!-- 仪表盘 -->
    <section id="page-dashboard" class="page active">
      <div class="stats-grid">
        <div class="stat-card primary">
          <div class="stat-icon">👥</div>
          <div class="stat-body">
            <div class="stat-value" id="stat-total">—</div>
            <div class="stat-label">学生总数</div>
          </div>
        </div>
        <div class="stat-card success">
          <div class="stat-icon">✅</div>
          <div class="stat-body">
            <div class="stat-value" id="stat-active">—</div>
            <div class="stat-label">在读学生</div>
          </div>
        </div>
        <div class="stat-card info">
          <div class="stat-icon">🏫</div>
          <div class="stat-body">
            <div class="stat-value" id="stat-grades">—</div>
            <div class="stat-label">年级数量</div>
          </div>
        </div>
        <div class="stat-card warning">
          <div class="stat-icon">📐</div>
          <div class="stat-body">
            <div class="stat-value" id="stat-majors">—</div>
            <div class="stat-label">开设专业</div>
          </div>
        </div>
      </div>

      <div class="dashboard-grid">
        <div class="card">
          <div class="card-header">年级分布</div>
          <div class="card-body">
            <div id="grade-chart" class="bar-chart"></div>
          </div>
        </div>
        <div class="card">
          <div class="card-header">热门专业 Top 5</div>
          <div class="card-body">
            <div id="major-chart" class="major-list"></div>
          </div>
        </div>
      </div>
    </section>

    <!-- 学生列表 -->
    <section id="page-list" class="page">
      <!-- 搜索栏 -->
      <div class="card search-card">
        <div class="search-grid">
          <div class="form-group">
            <label>学号（精确）</label>
            <input type="text" id="s-student-id" placeholder="输入学号">
          </div>
          <div class="form-group">
            <label>姓名（模糊）</label>
            <input type="text" id="s-name" placeholder="输入姓名">
          </div>
          <div class="form-group">
            <label>班级（模糊）</label>
            <input type="text" id="s-class" placeholder="输入班级">
          </div>
          <div class="form-group">
            <label>专业（模糊）</label>
            <input type="text" id="s-major" placeholder="输入专业">
          </div>
          <div class="form-group">
            <label>年级</label>
            <select id="s-grade">
              <option value="">全部年级</option>
              <option>大一</option><option>大二</option>
              <option>大三</option><option>大四</option>
            </select>
          </div>
          <div class="form-group">
            <label>状态</label>
            <select id="s-status">
              <option value="">全部状态</option>
              <option value="active">在读</option>
              <option value="graduated">已毕业</option>
              <option value="suspended">休学</option>
              <option value="inactive">注销</option>
            </select>
          </div>
        </div>
        <div class="search-actions">
          <button class="btn btn-primary" onclick="searchStudents()">🔍 搜索</button>
          <button class="btn btn-ghost" onclick="clearSearch()">清空</button>
        </div>
      </div>

      <!-- 列表 -->
      <div class="card">
        <div class="table-meta">
          <span id="result-count" class="result-count"></span>
          <button class="btn btn-sm btn-primary" onclick="showPage('add')">＋ 新增学生</button>
        </div>
        <div class="table-wrap">
          <table class="data-table">
            <thead>
              <tr>
                <th>学号</th><th>姓名</th><th>性别</th>
                <th>年级</th><th>班级</th><th>专业</th>
                <th>联系电话</th><th>状态</th><th>操作</th>
              </tr>
            </thead>
            <tbody id="student-tbody">
              <tr><td colspan="9" class="empty">暂无数据，请搜索或录入学生</td></tr>
            </tbody>
          </table>
        </div>
        <div class="pagination" id="pagination"></div>
      </div>
    </section>

    <!-- 录入 / 编辑 -->
    <section id="page-add" class="page">
      <div class="card form-card">
        <div class="card-header" id="form-title">录入新学生</div>
        <div class="card-body">
          <input type="hidden" id="edit-mode" value="add">
          <input type="hidden" id="edit-sid" value="">

          <div class="form-section-label">基础信息</div>
          <div class="form-grid">
            <div class="form-group required">
              <label>学号</label>
              <input type="text" id="f-student-id" placeholder="例：2024010001" maxlength="20">
            </div>
            <div class="form-group required">
              <label>姓名</label>
              <input type="text" id="f-name" placeholder="学生姓名" maxlength="30">
            </div>
            <div class="form-group">
              <label>性别</label>
              <select id="f-gender">
                <option value="male">男</option>
                <option value="female">女</option>
                <option value="other">其他</option>
              </select>
            </div>
            <div class="form-group">
              <label>出生日期</label>
              <input type="date" id="f-birth-date">
            </div>
          </div>

          <div class="form-section-label">学籍信息</div>
          <div class="form-grid">
            <div class="form-group required">
              <label>年级</label>
              <select id="f-grade">
                <option value="">请选择</option>
                <option>大一</option><option>大二</option>
                <option>大三</option><option>大四</option>
              </select>
            </div>
            <div class="form-group required">
              <label>班级</label>
              <input type="text" id="f-class" placeholder="例：计算机2401" maxlength="30">
            </div>
            <div class="form-group required">
              <label>专业</label>
              <input type="text" id="f-major" placeholder="例：计算机科学与技术" maxlength="50">
            </div>
            <div class="form-group">
              <label>学籍状态</label>
              <select id="f-status">
                <option value="active">在读</option>
                <option value="graduated">已毕业</option>
                <option value="suspended">休学</option>
                <option value="inactive">注销</option>
              </select>
            </div>
          </div>

          <div class="form-section-label">联系方式</div>
          <div class="form-grid">
            <div class="form-group">
              <label>手机号码</label>
              <input type="tel" id="f-phone" placeholder="11位手机号" maxlength="15">
            </div>
            <div class="form-group">
              <label>电子邮箱</label>
              <input type="email" id="f-email" placeholder="example@email.com" maxlength="60">
            </div>
            <div class="form-group span-2">
              <label>家庭住址</label>
              <input type="text" id="f-address" placeholder="详细地址" maxlength="100">
            </div>
          </div>

          <div class="form-actions">
            <button class="btn btn-primary" onclick="submitForm()">💾 保存</button>
            <button class="btn btn-ghost" onclick="resetForm()">重置</button>
            <button class="btn btn-ghost" onclick="showPage('list')">返回列表</button>
          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- 详情弹窗 -->
  <div id="modal-overlay" class="modal-overlay" onclick="closeModal()">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-header">
        <span id="modal-title">学生详情</span>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
      <div class="modal-footer">
        <button class="btn btn-primary" id="modal-edit-btn">✏️ 编辑</button>
        <button class="btn btn-danger" id="modal-del-btn">🗑️ 删除</button>
        <button class="btn btn-ghost" onclick="closeModal()">关闭</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast"></div>

  <script src="/static/js/app.js"></script>
</body>
</html>
